package:
  name: lidar_coordinate_conversion
  authors: ["Alina Zmeu <alina.zmeu@studio.unibo.it>"]

dependencies:
  axi_stream: {git: "https://github.com/pulp-platform/axi_stream.git", rev: "54891ff" }
  common_cells: {git: "https://github.com/pulp-platform/common_cells.git", version: "1.38.0" }

sources:
  - target: any(rtl,synthesis,test)
    files:
      - rtl/Lidar_ACM.sv
      - rtl/Lidar_CCM.sv
      - rtl/Lidar_top_level.sv
      - rtl/Lidar_DDM.sv
      - rtl/coordinate_serializer.sv


  - target: all(test, not(synthesis))
    files:
      - tb/load_stim_pkg.sv
      - tb/write_out_pkg.sv
      - tb/TB_Lidar_ACM.sv
      - tb/TB_Lidar_CCM.sv
      - tb/TB_Lidar_DDM.sv
      - tb/TB_Lidar_top_level.sv
      - tb/TB_Lidar_DDM_ACM.sv
      - tb/TB_DDM_ACM_CCM.sv
